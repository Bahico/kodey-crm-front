<div class="flex flex-col md:flex-row w-full p-4 gap-4 overflow-y-auto">
  <div class="card w-full md:w-100 flex flex-col">
    <!-- Основная информация -->
    <div class="flex flex-col gap-3 md:gap-6 p-3 md:p-6">
      <!-- Шапка -->
      <div class="flex items-center gap-3 text-primary">
        <svg-icon key="profile-sidebar" [size]="'lg'" class="shrink-0"/>
        <h2 class="text-base md:text-xl font-medium leading-tight">Персональные данные</h2>
      </div>

      <div class="h-px w-full shrink-0 bg-[#F0F2F4] dark:bg-[#28292D]" aria-hidden="true"></div>

      <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 md:gap-6 cursor-pointer">
        <div class="w-60 h-60 rounded-xl bg-black/20 flex flex-col items-center justify-center gap-2">
          <svg-icon key="profile-plus" fontSize="40px" class="text-white"/>
          <span class="text-secondary text-base">Загрузить фото</span>
        </div>
      </div>

      <!-- Разделитель -->
      <div class="h-px w-full shrink-0 bg-[#F0F2F4] dark:bg-[#28292D]" aria-hidden="true"></div>

      <!-- Личные данные -->
      <div class="flex flex-col gap-3">
        <tui-textfield>
          <label tuiLabel>Имя</label>

          <input
            tuiTextfield
            [readOnly]="true"
            [(ngModel)]="user().fullName"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>Telegram ID</label>

          <input
            tuiTextfield
            [readOnly]="true"
            [ngModel]="'5686506835'"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>Должность</label>

          <input
            tuiTextfield
            [readOnly]="true"
            [ngModel]="'Дизайнер'"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>Номер телефона</label>

          <input
            tuiTextfield
            [readOnly]="true"
            [ngModel]="'+998 97 000 00 00'"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>Корпоративная почта</label>

          <input
            tuiTextfield
            [readOnly]="true"
            [ngModel]="'viktor02315478@gmail.com'"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>Пароль</label>
          <input
            tuiTextfield
            [readOnly]="true"
            type="password"
            [ngModel]="'12412421412'"
          />
          <tui-icon tuiPassword/>
        </tui-textfield>
      </div>
    </div>
  </div>

  @if (!isAdmin()) {
    <div>
      <div class="card w-full md:w-150 flex flex-col gap-3 md:gap-6 p-3 md:p-6">
        <div class="flex justify-between">
          <div class="flex items-center gap-3 text-primary">
            <svg-icon key="profile-sidebar" [size]="'lg'" class="shrink-0"/>
            <h2 class="text-base md:text-xl font-medium leading-tight">Персональные данные</h2>
          </div>
          <button
            type="button"
            class="flex size-8 shrink-0 items-center justify-center rounded-lg text-[#7D7D85] dark:text-white cursor-pointer border border-simple-border dark:bg-[#20242C] hover:opacity-90 transition-opacity"
            aria-label="Редактировать профиль"
            (click)="editProfile()"
          >
            <svg-icon key="edit" size="md" />
          </button>
        </div>

        <div class="h-px w-full shrink-0 bg-[#F0F2F4] dark:bg-[#28292D]" aria-hidden="true"></div>

        <tui-textfield>
          <label tuiLabel>Humo</label>

          <input
            tuiTextfield
            [readOnly]="true"
            ngModel="0000 0000 0000 0000"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>Uzcard</label>

          <input
            tuiTextfield
            [readOnly]="true"
            ngModel="0000 0000 0000 0000"
          />
        </tui-textfield>

        <div class="h-px w-full shrink-0 bg-[#F0F2F4] dark:bg-[#28292D]" aria-hidden="true"></div>

        <tui-textfield>
          <label tuiLabel>Binance ID</label>

          <input
            tuiTextfield
            [readOnly]="true"
            ngModel="0000 0000 0000 0000"
          />
        </tui-textfield>
        <tui-textfield>
          <label tuiLabel>USDT trc20</label>

          <input
            tuiTextfield
            [readOnly]="true"
            ngModel="bAGse255BbBseghSA13UBEA1912ghteW"
          />
        </tui-textfield>
      </div>
    </div>
  }
</div>
