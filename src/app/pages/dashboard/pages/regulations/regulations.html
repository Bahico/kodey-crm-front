<div class="grid grid-cols-4 p-4 gap-3">
  <div
    (click)="addArticle()"
    class="bg-item rounded-lg flex flex-col gap-2 items-center justify-center cursor-pointer"
  >
    <svg-icon key="profile-plus" size="xl" />
    <span class="text-secondary">Загрузить статью</span>
  </div>

  @for (_ of [0, 1, 2, 3, 4, 5]; track $index) {
    <div class="flex p-3 rounded-lg bg-item flex-col gap-1 cursor-pointer">
      <img src="images/bot/test-post.png" alt="" class="w-full h-38 rounded-lg object-cover">
      <span class="text-primary mt-2 te xt-base truncate">Внутренние общение</span>
      <span class="text-secondary truncate">Общий регламент общения внутри компании Общий регламент общения внутри компании</span>
      <span class="text-accent">Дизайнер</span>
    </div>
  }
</div>
